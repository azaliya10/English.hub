<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>English Skills Hub</title>
  <style>
    /* ====== CSS ====== */
    body {
      background: linear-gradient(135deg, #ffe0f5, #ffd1ec);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      color: #333;
    }

    h1, h2 {
      text-align: center;
      font-weight: 800;
      color: #d81b60;
      margin-top: 20px;
    }

    nav {
      text-align: center;
      margin: 20px 0;
    }

    button {
      background: #ff80ab;
      border: none;
      padding: 12px 24px;
      margin: 5px;
      color: white;
      font-weight: bold;
      font-size: 16px;
      border-radius: 15px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    section {
      margin: 20px auto;
      padding: 20px;
      max-width: 900px;
    }

    section ul {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      padding: 0;
      list-style: none;
      justify-content: center;
    }

    section ul li {
      background: #fff;
      padding: 15px;
      width: 250px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    section ul li:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    a {
      text-decoration: none;
      color: #c2185b;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

    .hidden { display: none; }

  </style>
</head>
<body>

  <header>
    <h1>English Skills Hub</h1>
    <nav>
      <button onclick="showSection('grammar')">Grammar</button>
      <button onclick="showSection('vocabulary')">Vocabulary</button>
      <button onclick="showSection('speaking')">Speaking</button>
      <button onclick="showSection('listening')">Listening</button>
      <button onclick="showSection('quiz')">Quiz</button>
    </nav>
  </header>

  <!-- Sections -->
  <section id="grammar" class="hidden">
    <h2>Grammar: All Tenses</h2>
    <ul id="grammar-tips"></ul>
  </section>

  <section id="vocabulary" class="hidden">
    <h2>Vocabulary</h2>
    <ul id="vocabulary-list"></ul>
  </section>

  <section id="speaking" class="hidden">
    <h2>Speaking Practice</h2>
    <ul id="speaking-tips"></ul>
  </section>

  <section id="listening" class="hidden">
    <h2>Listening Practice</h2>
    <ul id="listening-tips"></ul>
  </section>

  <section id="quiz" class="hidden">
    <h2>Quiz</h2>
    <div id="quiz-container"></div>
  </section>

  <script>
    // ====== JavaScript ======
    const grammarTips = [
      "Present Simple: I play / He plays",
      "Present Continuous: I am playing",
      "Present Perfect: I have played",
      "Past Simple: I played",
      "Past Continuous: I was playing",
      "Past Perfect: I had played",
      "Future Simple: I will play",
      "Future Continuous: I will be playing"
    ];

    const vocabulary = [
      {word: "Innovative", meaning: "Creative, introducing new ideas."},
      {word: "Achieve", meaning: "Successfully reach a goal."},
      {word: "Challenge", meaning: "A difficult task."},
      {word: "Flexible", meaning: "Able to adapt easily."},
      {word: "Confidence", meaning: "Belief in yourself."},
      {word: "Motivate", meaning: "To give someone reason to act."},
      {word: "Goal", meaning: "The aim or desired result."},
      {word: "Focus", meaning: "Pay attention to one thing."},
      {word: "Success", meaning: "Achieving what you want."}
    ];

    const speakingTips = [
      "Practice speaking every day.",
      "Record yourself and listen.",
      "Speak slowly and clearly.",
      "Use new vocabulary in sentences.",
      "Try tongue twisters to improve pronunciation."
    ];

    const listeningTips = [
      {title: "BBC Learning English", link: "https://www.youtube.com/user/bbclearningenglish"},
      {title: "English Addict with Mr Steve", link: "https://www.youtube.com/watch?v=nm7h6QqP3jQ"},
      {title: "Learn English with Movies", link: "https://www.youtube.com/watch?v=U7u1w7RVkYs"}
    ];

    const quizQuestions = [
      {q: "Present Simple: I ___ to school every day", a: "go"},
      {q: "Past Simple: Yesterday I ___ a movie", a: "watched"},
      {q: "Future Simple: Tomorrow I ___ a book", a: "will read"},
      {q: "Vocabulary: opposite of 'failure'", a: "success"}
    ];

    function showSection(id) {
      const sections = document.querySelectorAll("section");
      sections.forEach(sec => sec.classList.add("hidden"));
      document.getElementById(id).classList.remove("hidden");

      if(id === "grammar") displayList("grammar-tips", grammarTips);
      if(id === "vocabulary") displayVocabulary();
      if(id === "speaking") displayList("speaking-tips", speakingTips);
      if(id === "listening") displayListening();
      if(id === "quiz") displayQuiz();
    }

    function displayList(elementId, array){
      const container = document.getElementById(elementId);
      container.innerHTML = array.map(item => `<li>${item}</li>`).join("");
    }

    function displayVocabulary(){
      const container = document.getElementById("vocabulary-list");
      container.innerHTML = vocabulary.map(item => `<li><b>${item.word}</b>: ${item.meaning}</li>`).join("");
    }

    function displayListening(){
      const container = document.getElementById("listening-tips");
      container.innerHTML = listeningTips.map(item => 
        `<li><a href="${item.link}" target="_blank">${item.title}</a></li>`).join("");
    }

    function displayQuiz(){
      const container = document.getElementById("quiz-container");
      let score = 0;
      container.innerHTML = "";
      quizQuestions.forEach((q,i)=>{
        const answer = prompt(`${i+1}. ${q.q}`);
        if(answer && answer.trim().toLowerCase() === q.a.toLowerCase()){
          alert("✅ Correct!");
          score++;
        } else {
          alert(`❌ Wrong! Correct answer: ${q.a}`);
        }
      });
      alert(`Your score: ${score}/${quizQuestions.length}`);
    }

  </script>
</body>
</html>
